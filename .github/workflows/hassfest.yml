# https://developers.home-assistant.io/blog/2020/04/16/hassfest/
name: Validate with HomeAssistant's hassfest
on:
  push:
  pull_request:
  schedule:
    - cron: "42 1 28 * *"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v3"
      - uses: home-assistant/actions/hassfest@master
